name: Download Pixel 8 Factory Image (Artifact)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:      # 允许手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y wget

      - name: Download factory image
        run: |
          VERSION="BP3A.251105.015"
          echo "正在下载工厂镜像 (版本: $VERSION) ..."
          # 尝试官方源
          wget -O factory.zip "https://dl.google.com/dl/android/aosp/shiba-${VERSION}-factory-6e81d1c7.zip" || \
          # 失败则尝试镜像站
          wget -O factory.zip "https://mirrors.lolinet.com/firmware/google/shiba/2025/factory/shiba-${VERSION}-factory-6e81d1c7.zip"
          if [ ! -f factory.zip ]; then
            echo "下载失败！"
            exit 1
          fi
          echo "下载完成，文件大小: $(du -h factory.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel8-factory-image
          path: factory.zip
          retention-days: 90   # 保留90天，足够你下载
