name: Source Connectivity Test

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install curl
        run: sudo apt update && sudo apt install -y curl

      - name: Test Google official factory image (hardcoded hash)
        run: |
          echo "=== 测试 Google 官方工厂镜像（带固定哈希）==="
          URL="https://dl.google.com/dl/android/aosp/shiba-bp3a.251105.015-factory-6e81d1c7.zip"
          echo "URL: $URL"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$URL")
          echo "HTTP状态: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ 官方链接可用"
          else
            echo "❌ 官方链接不可用（可能文件不存在或网络不通）"
          fi
          echo ""

      - name: Test Google factory image directory (dynamic)
        run: |
          echo "=== 测试 Google 工厂镜像列表页 ==="
          URL="https://developers.google.com/android/images"
          echo "URL: $URL"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$URL")
          echo "HTTP状态: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ 列表页可访问"
          else
            echo "❌ 列表页不可访问"
          fi
          echo ""

      - name: Test Google OTA page
        run: |
          echo "=== 测试 Google OTA 页面 ==="
          URL="https://developers.google.com/android/ota"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$URL")
          echo "HTTP状态: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ OTA页面可访问" || echo "❌ OTA页面不可访问"
          echo ""

      - name: Test lolinet factory directory
        run: |
          echo "=== 测试 lolinet 工厂镜像目录 ==="
          URL="https://mirrors.lolinet.com/firmware/google/shiba/2025/factory/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$URL")
          echo "HTTP状态: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ lolinet工厂目录可访问" || echo "❌ lolinet工厂目录不可访问"
          echo ""

      - name: Test lolinet OTA directory
        run: |
          echo "=== 测试 lolinet OTA 目录 ==="
          URL="https://mirrors.lolinet.com/firmware/google/shiba/ota/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$URL")
          echo "HTTP状态: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ lolinet OTA目录可访问" || echo "❌ lolinet OTA目录不可访问"
          echo ""

      - name: Test GitHub Release (placeholder)
        run: |
          echo "=== 测试 GitHub Release（你自己的仓库）==="
          # 这里需要替换为你的实际仓库和Release标签
          # 示例：https://github.com/你的用户名/你的仓库/releases/download/v1.0/factory.zip
          echo "请手动测试你仓库的Release链接，确保文件已上传"
          echo "示例链接: https://github.com/用户名/仓库名/releases/download/tag/文件名.zip"
          echo ""

      - name: Summary
        run: |
          echo "========== 连通性测试汇总 =========="
          echo "请查看上述各步骤的 HTTP 状态码。"
          echo "如果某个源返回 200，则可在工作流中使用它进行下载。"
          echo "如果所有源均不可用，可能需要考虑自托管运行器或代理。"
