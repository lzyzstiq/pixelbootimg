name: Download OTA Package (BP3A.251105.015)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install wget
        run: sudo apt update && sudo apt install -y wget

      - name: Download OTA package
        run: |
          wget -O ota.zip "https://googledownloads.cn/dl/android/aosp/shiba-ota-bp3a.251105.015-d5c6828c.zip"
          echo "下载完成，大小: $(du -h ota.zip | cut -f1)"

      - name: Upload OTA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel8-ota-package
          path: ota.zip
          retention-days: 90
