name: Download Factory Image and Extract boot.img

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y wget unzip

      - name: Fetch factory images page
        id: fetch
        run: |
          PAGE_URL="https://developers.google.com/android/images"
          echo "Fetching $PAGE_URL ..."
          curl -sL -A "Mozilla/5.0" "$PAGE_URL" -o factory_page.html

      - name: Extract download URL for Pixel 8 (shiba) version BP3A.251105.015
        id: get_url
        run: |
          VERSION="BP3A.251105.015"
          # 从页面中提取包含 shiba 和版本号的工厂镜像链接
          # 格式类似: shiba-bp3a.251105.015-factory-6e81d1c7.zip
          ZIP_FILE=$(grep -oP "shiba-${VERSION}-factory-[a-f0-9]{8,}\.zip" factory_page.html | head -n1)
          if [ -z "$ZIP_FILE" ]; then
            echo "未找到匹配的工厂镜像文件，请检查版本号"
            exit 1
          fi
          DOWNLOAD_URL="https://dl.google.com/dl/android/aosp/$ZIP_FILE"
          echo "Found: $DOWNLOAD_URL"
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Download factory image
        run: |
          URL="${{ steps.get_url.outputs.url }}"
          echo "Downloading factory image from $URL"
          wget -O factory.zip "$URL"
          if [ ! -f factory.zip ]; then
            echo "下载失败"
            exit 1
          fi
          echo "下载完成，文件大小: $(du -h factory.zip | cut -f1)"

      - name: Extract boot.img
        run: |
          unzip factory.zip -d factory_image
          cd factory_image
          # 找到内部的镜像包 (image-shiba-*.zip)
          IMAGE_ZIP=$(ls image-*.zip 2>/dev/null | head -n1)
          if [ -z "$IMAGE_ZIP" ]; then
            echo "未找到 image-*.zip 文件"
            exit 1
          fi
          unzip "$IMAGE_ZIP" -d extracted
          cp extracted/boot.img ../boot_original.img
          cd ..
          ls -lh boot_original.img

      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel8-boot-img
          path: boot_original.img
          retention-days: 90
