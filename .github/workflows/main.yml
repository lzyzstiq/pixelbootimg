name: Split OTA and Upload to Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  split-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install wget
        run: sudo apt update && sudo apt install -y wget

      - name: Download OTA package
        run: |
          wget -O ota.zip "https://googledownloads.cn/dl/android/aosp/shiba-ota-bp3a.251105.015-d5c6828c.zip"
          echo "下载完成，大小: $(du -h ota.zip | cut -f1)"

      - name: Split OTA into 5 parts
        run: |
          # 计算每个部分的大小（向上取整）
          total=$(stat -c%s ota.zip)
          part_size=$(( (total + 4) / 5 ))
          split -b $part_size ota.zip ota.part.
          # 重命名为更容易识别的名称
          for i in ota.part.??; do
            mv "$i" "${i/ota.part./ota-part-}"
          done
          # 显示分卷列表
          ls -lh ota-part-*

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "ota-split-v1"
          name: "Pixel 8 OTA Package (split into 5 parts)"
          body: |
            OTA 包大小 2.92GB，因 GitHub Release 限制拆分为 5 个分卷。
            请下载所有分卷后合并：`cat ota-part-* > ota.zip`
          files: |
            ota-part-*
