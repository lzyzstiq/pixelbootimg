name: Extract boot.img from Official OTA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip python3-pip

      - name: Install ota_extract
        run: pip3 install ota-extract

      - name: Download official OTA package
        run: |
          wget -O ota.zip "https://googledownloads.cn/dl/android/aosp/shiba-ota-bp3a.251105.015-d5c6828c.zip"
          echo "下载完成，大小: $(du -h ota.zip | cut -f1)"

      - name: Extract boot.img from OTA
        run: |
          unzip ota.zip -d ota_extract
          cd ota_extract
          ota_extract payload.bin boot.img
          cp boot.img ../boot_original.img
          cd ..
          ls -lh boot_original.img

      - name: Send email with boot.img
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.139.com
          server_port: 587
          username: lzyzstiq@139.com
          password: "@15368291z"
          subject: "Pixel 8 boot.img (BP3A.251105.015)"
          to: lzyzstiq@139.com
          from: "GitHub Actions <lzyzstiq@139.com>"
          body: |
            Pixel 8 官方 OTA 包中的 boot.img 已提取成功。
            版本：BP3A.251105.015
            文件大小：$(du -h boot_original.img | cut -f1)
            
            使用方法：
            1. 将此文件推送到手机：adb push boot_original.img /sdcard/Download/
            2. 用 APatch 修补该文件（设置超级密钥）
            3. 刷入修补后的镜像：fastboot flash boot 修补后的文件.img
            4. 重启验证
            
            本邮件由 GitHub Actions 自动发送。
          attachments: boot_original.img
