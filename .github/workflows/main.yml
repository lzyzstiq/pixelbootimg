name: Upload OTA to GitHub Release

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write   # 需要写入权限以创建 Release

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install wget
        run: sudo apt update && sudo apt install -y wget

      - name: Download OTA package
        run: |
          wget -O ota.zip "https://googledownloads.cn/dl/android/aosp/shiba-ota-bp3a.251105.015-d5c6828c.zip"
          echo "下载完成，大小: $(du -h ota.zip | cut -f1)"

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "ota-v1"                # 可自定义版本号
          name: "Pixel 8 OTA Package (BP3A.251105.015)"
          body: |
            从官方 OTA 链接下载的完整包，可用于提取 boot.img。
            版本：BP3A.251105.015
            文件大小：2.92 GB
          files: ota.zip
          draft: false
          prerelease: false
