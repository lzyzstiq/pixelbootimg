name: Download Pixel 8 Factory Image (BP3A.251105.015)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y wget jq

      - name: Fetch images.json
        run: curl -sL "https://developers.google.com/android/static/images.json" -o images.json

      - name: Get factory image URL for Pixel 8 (shiba) version BP3A.251105.015
        id: get_url
        run: |
          URL=$(jq -r '.[] | select(.codename=="shiba") | .builds[] | select(.version=="BP3A.251105.015") | .url' images.json)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "未找到匹配的工厂镜像"
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "下载地址: $URL"

      - name: Download factory image
        run: |
          wget -O factory.zip "${{ steps.get_url.outputs.url }}"
          echo "下载完成，大小: $(du -h factory.zip | cut -f1)"

      - name: Upload factory image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel8-factory-image
          path: factory.zip
          retention-days: 90
